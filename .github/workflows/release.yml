name: Release installer

# Triggers:
#   - Pushing a tag of the form v* (e.g. v0.1.0)   -> build + attach to a GH Release
#   - Manual workflow_dispatch                      -> build only; downloads as artifact
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string to embed (without leading v)'
        required: true
        default: '0.0.0-dev'

permissions:
  # softprops/action-gh-release needs contents:write to create the release
  # and upload assets. Default GITHUB_TOKEN scope is contents:read only.
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version
        id: ver
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'push') {
            $tag = '${{ github.ref_name }}'         # e.g. v0.1.0
            $v   = $tag -replace '^v',''
          } else {
            $v   = '${{ inputs.version }}'
          }
          Write-Host "Version: $v"
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Inno Setup (pinned)
        shell: pwsh
        # Pin a known Inno Setup release via direct download instead of
        # `choco install innosetup`. The Chocolatey package was shipping
        # an Inno Setup whose Pascal Script engine rejected modern
        # symbols (const-in-function, Randomize, GetTickCount) -- see
        # the v0.3.3..v0.3.5 commit trail. The official binary is
        # released on GitHub at jrsoftware/issrc; the URL pattern is
        # is-X_Y_Z for the tag (underscores) and innosetup-X.Y.Z.exe
        # for the filename (dots). Bump both when upgrading.
        run: |
          $url = 'https://github.com/jrsoftware/issrc/releases/download/is-6_7_2/innosetup-6.7.2.exe'
          $exe = Join-Path $env:RUNNER_TEMP 'innosetup-installer.exe'
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile $exe -UseBasicParsing
          # Silent install flags (https://jrsoftware.org/ishelp/index.php?topic=setupcmdline):
          #   /VERYSILENT      no UI
          #   /SUPPRESSMSGBOXES skip any leftover dialogs
          #   /SP-              don't show the "this will install..." prompt
          #   /NORESTART        never reboot the runner
          $p = Start-Process -FilePath $exe `
              -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/SP-','/NORESTART' `
              -Wait -PassThru
          if ($p.ExitCode -ne 0) { throw "Inno Setup installer exited with $($p.ExitCode)" }
          # Inno Setup 6 lands under Program Files (x86) on 64-bit Windows;
          # search Program Files too just in case a future release moves.
          $iscc = Get-ChildItem -Path `
              'C:\Program Files (x86)\Inno Setup 6', `
              'C:\Program Files\Inno Setup 6' `
              -Filter ISCC.exe -EA 0 | Select-Object -First 1
          if (-not $iscc) { throw "ISCC.exe not found after install" }
          Write-Host "ISCC: $($iscc.FullName)"
          "ISCC_PATH=$($iscc.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Fetch third-party binaries (MediaMTX, FFmpeg, nlohmann/json)
        shell: pwsh
        run: .\scripts\setup-deps.ps1

      - name: Build supervisor + helper exe (CMake / MSVC Release)
        shell: pwsh
        run: |
          cmake -S supervisor -B supervisor\build -G "Visual Studio 17 2022" -A x64
          cmake --build supervisor\build --config Release

      - name: Publish WPF UI (self-contained, single-file)
        shell: pwsh
        # -p:Version threads the tag-derived version into AssemblyVersion,
        # FileVersion, and AssemblyInformationalVersion. The About dialog
        # reads InformationalVersion at runtime, so the WPF About box and
        # the installer's "About" entry can no longer drift from the tag.
        run: |
          dotnet publish ui\WebcamStreamerUi `
            -c Release -r win-x64 `
            --self-contained true `
            -p:Version=${{ steps.ver.outputs.version }} `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:PublishReadyToRun=true `
            -o ui\WebcamStreamerUi\publish

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          & "$env:ISCC_PATH" "/DAppVersion=${{ steps.ver.outputs.version }}" installer\setup.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed" }
          $out = Get-Item "installer\output\WebcamStreamerSetup-v${{ steps.ver.outputs.version }}.exe"
          Write-Host "Built: $($out.FullName) ($([math]::Round($out.Length/1MB,1)) MB)"

      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebcamStreamerSetup-v${{ steps.ver.outputs.version }}
          path: installer/output/WebcamStreamerSetup-v${{ steps.ver.outputs.version }}.exe
          if-no-files-found: error

      - name: Attach installer to GitHub Release
        # Only when a real tag triggered the build. Manual runs just leave
        # the installer as a workflow artifact, downloadable from the run page.
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/output/WebcamStreamerSetup-v${{ steps.ver.outputs.version }}.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
